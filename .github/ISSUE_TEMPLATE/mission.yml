name: Company mission
description: Create an outcome-based mission for Atlas and the Codex team.
title: "[Mission]: "
labels: ["mission", "status: proposed"]
body:
  - type: dropdown
    id: project
    attributes:
      label: Project
      options:
        - Kipreh
        - Kingshot Discord Bot
        - AI Company OS
        - Blog maker
        - Physical product
        - Other
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the finished result, not the individual steps.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and source material
      description: Link relevant files, specifications, conversations, screenshots, or issues.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this mission is complete?
      placeholder: "- [ ] Requirement one\n- [ ] Requirement two"
    validations:
      required: true
  - type: checkboxes
    id: approvals
    attributes:
      label: Protected actions
      options:
        - label: Production deployment or TestFlight/App Store submission may be involved
        - label: Database migration or destructive data operation may be involved
        - label: External messaging, publication, or spending may be involved
        - label: Authentication, permissions, credentials, or secrets may be involved
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and exclusions
      description: State anything Atlas and the agents must not change.
